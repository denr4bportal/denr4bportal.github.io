<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>DENR Portal</title>
  <script>
    const links = [
      "http://172.16.32.32",
      "http://27.110.165.6:9229",
      "http://103.25.177.66:9229",
      "http://126.209.116.66:9229"
    ];

    let index = 0;

    function tryNext() {
      if (index >= links.length) {
        document.body.innerHTML = `
          <h2>Unable to connect to the system</h2>
          <p>If you can’t access our IS, try these alternatives:</p>
          <ul>
            <li>http://172.16.32.32</li>
            <li>http://27.110.165.6:9229</li>
            <li>http://103.25.177.66:9229</li>
            <li>http://126.209.116.66:9229</li>
          </ul>
        `;
        return;
      }

      // Attempt redirect
      window.location.href = links[index];

      // Move to next after delay (in case it fails)
      index++;
      setTimeout(tryNext, 3000);
    }

    window.onload = tryNext;
  </script>
</head>
<body>
  <p>If you can’t access our IS, try these alternatives:</p>
          <ul>
            <li>http://27.110.165.6:9229</li>
            <li>http://103.25.177.66:9229</li>
            <li>http://126.209.116.66:9229</li>
          </ul>
</body>
</html>
